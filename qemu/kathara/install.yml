---
- name: Install Kathara and Network Tools
  hosts: localhost
  become: yes
  vars:
    docker_compose_version: "v2.29.2"
    docker_major_version: "28"
    netcap_version: "v0.6.11"
    docker_registry: "docker.io"
    kathara_images:
      - kathara/base
      - kathara/frr
      - kathara/quagga
      - kathara/pox
      - kathara/sdn

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
          - software-properties-common
          - git
          - wget
        state: present

    - name: Setup Docker
      block:
        # Ubuntu 24.04 ships iptables-nft by default. Docker's iptables
        # manipulation against the nftables backend has been observed to
        # momentarily drop established connections (e.g. our provisioning
        # SSH) and to leave the guest network stack in a wedged state.
        # Pinning to iptables-legacy avoids the backend churn.
        - name: Switch iptables to legacy backend
          alternatives:
            name: "{{ item.name }}"
            path: "{{ item.path }}"
          loop:
            - { name: iptables,  path: /usr/sbin/iptables-legacy  }
            - { name: ip6tables, path: /usr/sbin/ip6tables-legacy }

        - name: Ensure apt keyrings directory
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Add Docker apt signing key
          get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: '0644'
            force: true
          register: docker_key
          until: docker_key is succeeded
          retries: 5
          delay: 10

        - name: Detect dpkg architecture
          command: dpkg --print-architecture
          register: dpkg_arch
          changed_when: false

        - name: Add Docker apt repository
          apt_repository:
            repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present
            filename: docker
            update_cache: yes

        - name: Resolve latest Docker v{{ docker_major_version }} package version
          shell: |
            set -o pipefail
            apt-cache madison docker-ce | awk '$3 ~ /^5:{{ docker_major_version }}\./ {print $3; exit}'
          args:
            executable: /bin/bash
          register: docker_ce_version
          changed_when: false
          failed_when: docker_ce_version.stdout | trim == ""

        # Block dpkg postinst from starting docker/containerd during the
        # install. Once started, docker inserts iptables rules and flushes
        # conntrack, which kills our provisioning SSH session and freezes
        # the guest network. Systemd units are disabled/masked below so
        # they also don't start on runtime boot — the container entrypoint
        # / user starts docker explicitly when the VM is actually in use.
        - name: Install policy-rc.d to block service auto-start
          copy:
            dest: /usr/sbin/policy-rc.d
            mode: '0755'
            content: |
              #!/bin/sh
              exit 101

        - name: Install Docker v{{ docker_major_version }} packages
          apt:
            name:
              - "docker-ce={{ docker_ce_version.stdout }}"
              - "docker-ce-cli={{ docker_ce_version.stdout }}"
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: no
          environment:
            DEBIAN_FRONTEND: noninteractive
            NEEDRESTART_MODE: a
            NEEDRESTART_SUSPEND: "1"

        - name: Remove policy-rc.d
          file:
            path: /usr/sbin/policy-rc.d
            state: absent

        - name: Add idekube user to docker group
          user:
            name: "idekube"
            groups: docker
            append: yes

    - name: Setup Kathara (amd64 only)
      block:
        - name: Add Kathara PPA
          apt_repository:
            repo: ppa:katharaframework/kathara
            state: present

        - name: Install Kathara and network tools
          apt:
            name:
              - kathara
            state: present
            update_cache: yes
      when: ansible_architecture == "x86_64"

    - name: Install network tools
      apt:
        name:
          - nano
          - gedit
          - xterm
          - wireshark
          - iperf
          - iperf3
          - netcat-traditional
          - tcpdump
        state: present
        update_cache: yes

    - name: Setup netcap (amd64 only)
      block:
        - name: Download netcap
          get_url:
            url: "https://github.com/dreadl0ck/netcap/releases/download/{{ netcap_version }}/netcap_{{ netcap_version }}_linux_amd64_libc.tar.gz"
            dest: /tmp/netcap.tar.gz
            mode: '0644'

        - name: Extract netcap
          unarchive:
            src: /tmp/netcap.tar.gz
            dest: /tmp
            remote_src: yes

        - name: Install netcap binary
          copy:
            src: "/tmp/netcap_{{ netcap_version }}_linux_amd64_libc/net"
            dest: /usr/bin/net
            mode: '0755'
            remote_src: yes

        - name: Clean up netcap download
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/netcap.tar.gz
            - "/tmp/netcap_{{ netcap_version }}_linux_amd64_libc"
      when: ansible_architecture == "x86_64"

    - name: Setup Kathara Labs and Docker configuration
      block:
        - name: Clone Kathara Labs repository
          git:
            repo: https://github.com/KatharaFramework/Kathara-Labs.git
            dest: /opt/Kathara-Labs
            version: main
        # - name: Start and enable Docker service
        #   systemd:
        #     name: docker
        #     state: started
        #     enabled: yes
        # - name: Pull Kathara Docker images
        #   docker_image:
        #     name: "{{ docker_registry }}/{{ item }}"
        #     source: pull
        #   loop: "{{ kathara_images }}"

    - name: Clean up
      block:
      - name: Clean apt cache
        apt:
          autoclean: yes
          autoremove: yes
      - name: Remove temporary files
        shell:
          rm -rf /tmp/*
      - name: Replace Home Directory with /etc/skel/
        shell:
          rsync -a --delete /etc/skel/ /home/idekube/
        ignore_errors: yes

    # Clean cloud-init state so it re-runs on first runtime boot
    - name: Clean cloud-init state
      shell: cloud-init clean --logs
      ignore_errors: yes
